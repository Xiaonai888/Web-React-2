<!DOCTYPE html>
<html lang="km">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Shadow</title>
  <link rel="icon" href="/assets/Icons/shadow-favicon-black.svg?v=20260602" type="image/svg+xml" />
<link rel="shortcut icon" href="/assets/Icons/shadow-favicon-black.svg?v=20260602" type="image/svg+xml" />
<link rel="apple-touch-icon" href="/assets/Icons/shadow-favicon-black.svg?v=20260602" />
<meta name="theme-color" content="#000000" />
<link rel="manifest" href="/manifest.webmanifest" />

  <script>
    try {
      const theme = localStorage.getItem('shadow_theme') === 'dark' ? 'dark' : 'light'
      document.documentElement.classList.toggle('dark', theme === 'dark')
      document.documentElement.style.colorScheme = theme
    } catch {
      document.documentElement.classList.remove('dark')
      document.documentElement.style.colorScheme = 'light'
    }
  </script>

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
    }
  </script>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <link rel="stylesheet" href="https://unpkg.com/swiper/swiper-bundle.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Kantumruy+Pro:wght@400;600;700&family=Inter:wght@400;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
</head>
<body>
  <div id="root"></div>
  <script src="https://unpkg.com/swiper/swiper-bundle.min.js"></script>
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
